services:
  postgres:
    image: postgres:16-alpine
    container_name: delivergo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: delivergo
      POSTGRES_PASSWORD: delivergo
      POSTGRES_DB: delivergo
    volumes:
      - delivergo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivergo -d delivergo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  delivergo_pg_data:
